version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wallet_butler_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wallet_butler
      MYSQL_USER: wallet_user
      MYSQL_PASSWORD: wallet_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - wallet_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: wallet_butler_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - wallet_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wallet_butler_backend
    restart: always
    environment:
      DATABASE_URL: mysql+asyncmy://wallet_user:wallet_password@mysql/wallet_butler
      SECRET_KEY: my-secret-key-change-in-production-2026
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      APP_NAME: My Wallet Butler
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    networks:
      - wallet_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wallet_butler_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - wallet_network

networks:
  wallet_network:
    driver: bridge

volumes:
  mysql_data:
